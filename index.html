<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Manual Personal</title>
  
  <!-- Tailwind CSS para los estilos rápidos y adaptables -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', // Habilita el modo oscuro basado en clases
    }
  </script>
  
  <!-- Iconos Lucide (CDN) para una interfaz más visual -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React y ReactDOM para la interactividad de la interfaz -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para que el navegador pueda interpretar el código JSX directamente -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased selection:bg-indigo-100 selection:text-indigo-900 dark:selection:bg-indigo-900 dark:selection:text-indigo-100 transition-colors duration-200">
  
  <!-- Contenedor principal donde React renderizará la aplicación -->
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInAnonymously } from "firebase/auth";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "firebase/firestore";

    const { useState, useEffect, useMemo } = React;

    // Tus claves reales de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCNOQYnMAJ5iW5ON0D1A1cElAji0C41Sms",
      authDomain: "home-finance-ee8fd.firebaseapp.com",
      projectId: "home-finance-ee8fd",
      storageBucket: "home-finance-ee8fd.firebasestorage.app",
      messagingSenderId: "484237400024",
      appId: "1:484237400024:web:36c2a0021b0d0ed79e84ad"
    };

    // Identificador único para estructurar la base de datos de forma segura
    const APP_ID = "mi-manual-personal";

    // Inicializar los servicios de Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- COMPONENTE MODAL DE MANUAL DE LA APP (NOVEDAD) ---
    const SystemManualModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl transition-colors duration-200">
            <div className="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-between items-center rounded-t-2xl">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-lg">
                  <i data-lucide="info" className="w-6 h-6"></i>
                </div>
                <h2 className="text-xl font-bold text-slate-800 dark:text-white">Guía de la Aplicación</h2>
              </div>
              <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition">
                <i data-lucide="x" className="w-5 h-5"></i>
              </button>
            </div>
            
            <div className="p-6 overflow-y-auto space-y-8 bg-white dark:bg-slate-800">
              
              {/* Sección: Cómo usar */}
              <section>
                <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-3 border-b dark:border-slate-700 pb-2">¿Cómo funciona?</h3>
                <p className="text-slate-600 dark:text-slate-300 text-sm mb-4 leading-relaxed">
                  Esta aplicación es tu "segundo cerebro". Está diseñada para guardar el paso a paso de trámites, configuraciones o tareas que no haces a menudo y sueles olvidar cómo se hacían.
                </p>
                <ul className="space-y-3 text-sm text-slate-600 dark:text-slate-300">
                  <li className="flex items-start gap-2">
                    <i data-lucide="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5"></i>
                    <span><strong>Crear un manual:</strong> Pulsa el botón "Nuevo Manual", asigna un título, elige (o crea) una categoría y detalla los pasos.</span>
                  </li>
                  <li className="flex items-start gap-2">
                    <i data-lucide="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5"></i>
                    <span><strong>Buscar rápido:</strong> Usa la barra superior. Buscará palabras clave tanto en el título como dentro de los pasos que hayas escrito.</span>
                  </li>
                  <li className="flex items-start gap-2">
                    <i data-lucide="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5"></i>
                    <span><strong>Categorizar:</strong> Puedes filtrar tus manuales pulsando las etiquetas (Familia, Casa, Coche...) en la parte superior.</span>
                  </li>
                </ul>
              </section>

              {/* Sección: Historial de Novedades */}
              <section>
                <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-3 border-b dark:border-slate-700 pb-2">Historial de Actualizaciones</h3>
                <div className="space-y-4">
                  
                  <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-semibold text-indigo-700 dark:text-indigo-400">Versión Actual</span>
                      <span className="text-xs text-slate-500 dark:text-slate-400 font-medium">17 Julio 2026</span>
                    </div>
                    <ul className="list-disc list-inside text-sm text-slate-600 dark:text-slate-300 space-y-1">
                      <li>Añadido este manual de uso y registro de actualizaciones.</li>
                      <li>Integración de <strong>Modo Oscuro/Claro</strong> adaptable al sistema y con guardado de preferencias.</li>
                      <li>Conexión a <strong>Firebase (Nube)</strong>: Los datos ahora se guardan y sincronizan automáticamente de forma segura.</li>
                      <li>Creación de interfaz base en archivo único (`index.html`) para publicación fácil.</li>
                      <li>Añadida la capacidad de crear categorías personalizadas sobre la marcha.</li>
                      <li>Desarrollo de interfaz principal con buscador avanzado (busca en el contenido de los pasos).</li>
                    </ul>
                  </div>

                  {/* Aquí añadiremos los futuros bloques cuando metamos cosas nuevas */}

                </div>
              </section>

            </div>
            
            <div className="p-4 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end rounded-b-2xl">
              <button onClick={onClose} className="px-5 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600 rounded-lg shadow-sm transition">
                Entendido
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- COMPONENTE MODAL (Formulario para añadir) ---
    const AddManualModal = ({ isOpen, onClose, onSave, categories }) => {
      const [title, setTitle] = useState('');
      const [category, setCategory] = useState('');
      const [steps, setSteps] = useState(['']);

      // Reiniciar el formulario cada vez que se abre el modal
      useEffect(() => {
        if (isOpen) {
          setTitle('');
          setCategory('');
          setSteps(['']);
          // Forzar renderizado de iconos tras actualizar el DOM
          setTimeout(() => lucide.createIcons(), 0);
        }
      }, [isOpen]);

      if (!isOpen) return null;

      const handleAddStep = () => setSteps([...steps, '']);
      const handleStepChange = (index, value) => {
        const newSteps = [...steps];
        newSteps[index] = value;
        setSteps(newSteps);
      };
      const handleRemoveStep = (index) => {
        if (steps.length > 1) {
          setSteps(steps.filter((_, i) => i !== index));
        }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (title.trim() && category.trim() && steps[0].trim()) {
          onSave({
            title: title.trim(),
            category: category.trim(),
            steps: steps.filter(s => s.trim() !== '')
          });
        }
      };

      return (
        <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl transition-colors duration-200">
            <div className="p-6 border-b dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/80 rounded-t-2xl">
              <h2 className="text-xl font-bold text-slate-800 dark:text-white">Crear nuevo manual</h2>
              <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition">
                <i data-lucide="x" className="w-5 h-5"></i>
              </button>
            </div>
            
            <form onSubmit={handleSubmit} className="p-6 space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Título del trámite o tarea</label>
                  <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej. Solicitar beca comedor..." className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:focus:border-indigo-500 transition outline-none dark:text-white dark:placeholder-slate-500" autoFocus required />
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Categoría</label>
                  <input type="text" list="category-suggestions" value={category} onChange={e => setCategory(e.target.value)} placeholder="Ej. Familia, Casa, Coche..." className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:focus:border-indigo-500 transition outline-none dark:text-white dark:placeholder-slate-500" required />
                  <datalist id="category-suggestions">
                    {categories.filter(c => c !== 'Todas').map((c, i) => <option key={i} value={c} />)}
                  </datalist>
                </div>
              </div>

              <div className="space-y-3">
                <label className="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                  Pasos a seguir
                  <span className="text-xs font-normal text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-md">Paso a paso</span>
                </label>
                {steps.map((step, index) => (
                  <div key={index} className="flex gap-3 items-start group">
                    <div className="w-8 h-8 shrink-0 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-full flex items-center justify-center font-bold text-sm mt-1">
                      {index + 1}
                    </div>
                    <textarea value={step} onChange={e => handleStepChange(index, e.target.value)} placeholder={`Descripción del paso ${index + 1}...`} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 dark:focus:border-indigo-500 transition outline-none min-h-[60px] resize-y dark:text-white dark:placeholder-slate-500" required={index === 0} />
                    <button type="button" onClick={() => handleRemoveStep(index)} disabled={steps.length === 1} className="p-3 text-red-400 dark:text-red-500 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition disabled:opacity-30 disabled:hover:bg-transparent mt-1">
                      <i data-lucide="trash-2" className="w-5 h-5"></i>
                    </button>
                  </div>
                ))}
                <button type="button" onClick={handleAddStep} className="flex items-center gap-2 text-sm font-medium text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 p-2 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-lg transition mt-2">
                  <i data-lucide="plus" className="w-4 h-4"></i> Añadir otro paso
                </button>
              </div>
            </form>

            <div className="p-6 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end gap-3 rounded-b-2xl">
              <button type="button" onClick={onClose} className="px-5 py-2.5 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition">Cancelar</button>
              <button onClick={handleSubmit} className="px-5 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600 rounded-lg shadow-sm transition">Guardar Manual</button>
            </div>
          </div>
        </div>
      );
    };

    // --- APLICACIÓN PRINCIPAL ---
    const App = () => {
      const [user, setUser] = useState(null);
      const [items, setItems] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [activeCategory, setActiveCategory] = useState('Todas');
      const [customCategories, setCustomCategories] = useState([]);
      const [isAddingCategory, setIsAddingCategory] = useState(false);
      const [newCategoryName, setNewCategoryName] = useState('');
      
      // Control de Modales
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [isSystemManualOpen, setIsSystemManualOpen] = useState(false); // Estado para el manual de la app
      
      const [dbError, setDbError] = useState(null);

      // Estado y Lógica del Modo Oscuro
      const [isDarkMode, setIsDarkMode] = useState(() => {
        if (typeof window !== 'undefined') {
          const saved = localStorage.getItem('theme');
          if (saved) return saved === 'dark';
          // Si no hay guardado, usa la preferencia del sistema operativo
          return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        return false;
      });

      // Efecto para inyectar/quitar la clase 'dark' en el documento raíz y guardar la preferencia
      useEffect(() => {
        const root = window.document.documentElement;
        if (isDarkMode) {
          root.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          root.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDarkMode]);

      // Re-renderizar iconos en cada actualización
      useEffect(() => {
        lucide.createIcons();
      });

      // 1. Iniciar sesión anónima al cargar
      useEffect(() => {
        const authenticate = async () => {
          try {
            const userCredential = await signInAnonymously(auth);
            setUser(userCredential.user);
          } catch (error) {
            console.error("Error Auth:", error);
            setDbError("No se ha podido conectar de forma segura. Comprueba tu conexión.");
          }
        };
        authenticate();
      }, []);

      // 2. Cargar datos una vez que el usuario está autenticado
      useEffect(() => {
        if (!user) return; // Esperar a que el usuario exista
        
        // Rutas seguras y estructuradas en Firestore
        const manualsPath = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals');
        const categoriesPath = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'categories');
        
        // Listener de Manuales
        const unsubManuals = onSnapshot(manualsPath, (snapshot) => {
          const loadedItems = snapshot.docs.map(docSnap => docSnap.data());
          // Ordenación en memoria (evita requerir índices complejos en Firestore)
          loadedItems.sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));
          setItems(loadedItems);
          setDbError(null);
        }, (err) => {
          console.error("Error cargando manuales:", err);
          if (err.code === 'permission-denied') {
            setDbError('Error de permisos en Firebase. Debes actualizar las reglas de Firestore a modo lectura/escritura.');
          }
        });

        // Listener de Categorías personalizadas
        const unsubCategories = onSnapshot(categoriesPath, (docSnap) => {
          if (docSnap.exists() && docSnap.data().custom) {
            setCustomCategories(docSnap.data().custom);
          }
        }, (err) => {
          console.error("Error cargando categorías:", err);
        });

        // Limpieza de listeners
        return () => {
          unsubManuals();
          unsubCategories();
        };
      }, [user]);

      const categories = useMemo(() => {
        const cats = new Set([...items.map(item => item.category), ...customCategories]);
        return ['Todas', ...Array.from(cats)].sort();
      }, [items, customCategories]);

      const filteredItems = useMemo(() => {
        return items.filter(item => {
          const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                item.steps.some(step => step.toLowerCase().includes(searchQuery.toLowerCase()));
          const matchesCategory = activeCategory === 'Todas' || item.category === activeCategory;
          return matchesSearch && matchesCategory;
        });
      }, [items, searchQuery, activeCategory]);

      const handleSaveNewCategory = async () => {
        if (newCategoryName.trim() && user) {
          const newCustom = [...customCategories, newCategoryName.trim()];
          setCustomCategories(newCustom);
          setActiveCategory(newCategoryName.trim());
          const categoryDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'categories');
          await setDoc(categoryDocRef, { custom: newCustom });
        }
        setIsAddingCategory(false);
        setNewCategoryName('');
      };

      const handleAddItem = async (newItemData) => {
        if (!user) return;
        const newId = Math.random().toString(36).substr(2, 9);
        const newItem = {
          ...newItemData,
          id: newId,
          lastUpdated: new Date().toISOString().split('T')[0]
        };
        setIsAddModalOpen(false);
        
        const manualDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', newId);
        await setDoc(manualDocRef, newItem);
      };

      const handleDeleteItem = async (id) => {
        if (!user) return;
        setSelectedItem(null);
        
        const manualDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', id);
        await deleteDoc(manualDocRef);
      };

      return (
        <div className="min-h-screen">
          <header className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 sticky top-0 z-30 shadow-sm transition-colors duration-200">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div className="flex items-center gap-3 w-full sm:w-auto">
                  <div className="w-10 h-10 bg-indigo-600 dark:bg-indigo-500 rounded-xl flex items-center justify-center shadow-indigo-200 dark:shadow-none shadow-lg shrink-0">
                    <i data-lucide="book-open" className="text-white w-6 h-6"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-indigo-500 dark:from-indigo-400 dark:to-indigo-300">Mi Manual Personal</h1>
                    <p className="text-xs text-slate-500 dark:text-slate-400 font-medium tracking-wide uppercase">Tu segundo cerebro</p>
                  </div>
                </div>
                
                <div className="w-full sm:w-auto flex gap-3">
                  <div className="relative w-full sm:w-72">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <i data-lucide="search" className="h-4 w-4 text-slate-400 dark:text-slate-500"></i>
                    </div>
                    <input 
                      type="text" 
                      placeholder="Buscar un trámite..." 
                      className="block w-full pl-10 pr-3 py-2 border border-slate-200 dark:border-slate-600 rounded-xl leading-5 bg-slate-50 dark:bg-slate-900 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition shadow-inner dark:text-white"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                  </div>
                  
                  {/* Botón de Manual de la App */}
                  <button 
                    onClick={() => setIsSystemManualOpen(true)} 
                    className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition flex-shrink-0"
                    title="Manual y Novedades"
                  >
                    <i data-lucide="help-circle" className="w-5 h-5"></i>
                  </button>

                  {/* Botón de Modo Oscuro */}
                  <button 
                    onClick={() => setIsDarkMode(!isDarkMode)} 
                    className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition flex-shrink-0"
                    title={isDarkMode ? "Cambiar a modo claro" : "Cambiar a modo oscuro"}
                  >
                    {isDarkMode ? <i data-lucide="sun" className="w-5 h-5"></i> : <i data-lucide="moon" className="w-5 h-5"></i>}
                  </button>

                  <button onClick={() => setIsAddModalOpen(true)} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 dark:hover:bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold transition shadow-sm hover:shadow shrink-0">
                    <i data-lucide="plus" className="w-4 h-4"></i> <span className="hidden sm:inline">Nuevo Manual</span>
                  </button>
                </div>
              </div>

              {/* Categorías */}
              <div className="mt-6 flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                {categories.map(cat => (
                  <button 
                    key={cat}
                    onClick={() => setActiveCategory(cat)}
                    className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all flex-shrink-0 ${
                      activeCategory === cat 
                        ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 shadow-sm ring-1 ring-indigo-200 dark:ring-indigo-700' 
                        : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 dark:hover:bg-slate-700'
                    }`}
                  >
                    {cat}
                  </button>
                ))}
                
                {isAddingCategory ? (
                  <div className="flex items-center gap-1 bg-white dark:bg-slate-800 border border-indigo-200 dark:border-indigo-700 rounded-full pl-3 pr-1 py-1 flex-shrink-0">
                    <input 
                      type="text" 
                      autoFocus
                      placeholder="Nombre..."
                      className="text-sm outline-none bg-transparent w-24 text-slate-700 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500"
                      value={newCategoryName}
                      onChange={(e) => setNewCategoryName(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleSaveNewCategory()}
                    />
                    <button onClick={handleSaveNewCategory} className="p-1 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-full hover:bg-indigo-200 dark:hover:bg-indigo-800 transition">
                      <i data-lucide="check" className="w-3 h-3"></i>
                    </button>
                    <button onClick={() => setIsAddingCategory(false)} className="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition">
                      <i data-lucide="x" className="w-3 h-3"></i>
                    </button>
                  </div>
                ) : (
                  <button 
                    onClick={() => setIsAddingCategory(true)}
                    className="px-3 py-1.5 rounded-full text-sm font-medium whitespace-nowrap border border-dashed border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:border-indigo-300 dark:hover:border-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-all flex items-center gap-1 flex-shrink-0"
                  >
                    <i data-lucide="plus" className="w-3 h-3"></i> Añadir
                  </button>
                )}
              </div>
            
              {/* Error db */}
              {dbError && (
                <div className="mt-4 p-3 bg-red-100 dark:bg-red-900/30 border border-red-300 dark:border-red-800 text-red-700 dark:text-red-400 rounded-lg text-sm flex items-center gap-2 shadow-sm">
                  <i data-lucide="alert-circle" className="w-5 h-5 shrink-0"></i>
                  <p className="font-medium">{dbError}</p>
                </div>
              )}
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {/* Estado Vacío */}
            {filteredItems.length === 0 ? (
              <div className="text-center py-20 bg-white dark:bg-slate-800 rounded-2xl border border-dashed border-slate-300 dark:border-slate-600 shadow-sm transition-colors duration-200">
                <i data-lucide="book-dashed" className="mx-auto h-12 w-12 text-slate-300 dark:text-slate-600 mb-4"></i>
                <h3 className="text-lg font-medium text-slate-900 dark:text-slate-100 mb-1">No hay manuales aquí</h3>
                <p className="text-slate-500 dark:text-slate-400 max-w-sm mx-auto">
                  {searchQuery 
                    ? `No se ha encontrado nada que coincida con "${searchQuery}".`
                    : "Añade tu primer manual para empezar a construir tu memoria digital."}
                </p>
                {!searchQuery && (
                  <button onClick={() => setIsAddModalOpen(true)} className="mt-6 inline-flex items-center gap-2 text-indigo-600 dark:text-indigo-400 font-medium hover:text-indigo-800 dark:hover:text-indigo-300 bg-indigo-50 dark:bg-indigo-900/30 px-5 py-2.5 rounded-xl transition">
                    <i data-lucide="plus" className="w-5 h-5"></i> Crear mi primer manual
                  </button>
                )}
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {filteredItems.map(item => (
                  <div 
                    key={item.id} 
                    onClick={() => setSelectedItem(item)}
                    className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 hover:border-indigo-300 dark:hover:border-indigo-500 hover:shadow-xl transition-all cursor-pointer group flex flex-col h-full relative overflow-hidden shadow-sm"
                  >
                    <div className="absolute top-0 left-0 w-1.5 h-full bg-indigo-500 dark:bg-indigo-400 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div className="flex justify-between items-start mb-4">
                      <span className="inline-block px-3 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-bold rounded-lg tracking-wide uppercase group-hover:bg-indigo-50 dark:group-hover:bg-indigo-900/50 group-hover:text-indigo-700 dark:group-hover:text-indigo-300 transition-colors">
                        {item.category}
                      </span>
                      <span className="text-xs text-slate-400 dark:text-slate-500 font-medium flex items-center gap-1">
                        <i data-lucide="calendar" className="w-3 h-3"></i> {item.lastUpdated}
                      </span>
                    </div>
                    <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-3 group-hover:text-indigo-700 dark:group-hover:text-indigo-400 transition-colors line-clamp-2 leading-tight">
                      {item.title}
                    </h3>
                    <p className="text-sm text-slate-500 dark:text-slate-400 mt-auto bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700/50 line-clamp-2">
                      <span className="font-semibold text-slate-700 dark:text-slate-300">Paso 1:</span> {item.steps[0]}
                    </p>
                  </div>
                ))}
              </div>
            )}
          </main>

          {/* Modal de Detalle */}
          {selectedItem && (
            <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl transition-colors duration-200">
                <div className="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-between items-start">
                  <div>
                    <span className="inline-block px-3 py-1 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 text-xs font-bold rounded-lg tracking-wide uppercase mb-3">
                      {selectedItem.category}
                    </span>
                    <h2 className="text-2xl font-bold text-slate-800 dark:text-white leading-tight pr-4">{selectedItem.title}</h2>
                    <p className="text-sm text-slate-500 dark:text-slate-400 mt-2 font-medium flex items-center gap-1">
                      <i data-lucide="clock" className="w-4 h-4"></i> Última actualización: {selectedItem.lastUpdated}
                    </p>
                  </div>
                  <div className="flex gap-2 flex-shrink-0">
                    <button onClick={() => handleDeleteItem(selectedItem.id)} className="p-2 text-slate-400 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-full transition" title="Borrar manual">
                      <i data-lucide="trash-2" className="w-5 h-5"></i>
                    </button>
                    <button onClick={() => setSelectedItem(null)} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition">
                      <i data-lucide="x" className="w-5 h-5"></i>
                    </button>
                  </div>
                </div>
                
                <div className="p-6 overflow-y-auto bg-white dark:bg-slate-800">
                  <div className="space-y-6">
                    {selectedItem.steps.map((step, index) => (
                      <div key={index} className="flex gap-4">
                        <div className="w-10 h-10 shrink-0 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 rounded-2xl flex items-center justify-center font-bold text-lg border border-indigo-100 dark:border-indigo-800/50 shadow-sm">
                          {index + 1}
                        </div>
                        <div className="pt-2 text-slate-700 dark:text-slate-200 leading-relaxed whitespace-pre-wrap text-base">
                          {step}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                
                <div className="p-6 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end rounded-b-2xl">
                  <button onClick={() => setSelectedItem(null)} className="px-6 py-2.5 bg-slate-800 dark:bg-indigo-600 hover:bg-slate-900 dark:hover:bg-indigo-700 text-white font-medium rounded-xl shadow-sm transition flex items-center gap-2">
                    <i data-lucide="check" className="w-4 h-4"></i> Listo
                  </button>
                </div>
              </div>
            </div>
          )}
          
          <AddManualModal 
            isOpen={isAddModalOpen} 
            onClose={() => setIsAddModalOpen(false)} 
            onSave={handleAddItem}
            categories={categories}
          />

          <SystemManualModal
            isOpen={isSystemManualOpen}
            onClose={() => setIsSystemManualOpen(false)}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
