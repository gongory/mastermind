<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastermind</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  
  <!-- Iconos Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Import Map -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js"
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased selection:bg-indigo-100 selection:text-indigo-900 dark:selection:bg-indigo-900 dark:selection:text-indigo-100 transition-colors duration-200 print:bg-white print:text-black">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "firebase/auth";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "firebase/firestore";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "firebase/storage";

    const { useState, useEffect, useMemo, useRef } = React;

    // Tus claves reales de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCdgso-gXcUuZJAt9gl4wZgnzIMNZokYIY",
      authDomain: "mastermind-ab1d7.firebaseapp.com",
      projectId: "mastermind-ab1d7",
      storageBucket: "mastermind-ab1d7.firebasestorage.app",
      messagingSenderId: "1074125401299",
      appId: "1:1074125401299:web:9d2410c0562a3db7c1f826",
      measurementId: "G-ZL91PEP2KB"
    };

    const APP_ID = "mi-manual-personal";

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // --- ESCUDO PROTECTOR PARA LOS ICONOS (Evita que React se rompa) ---
    const Icon = ({ name, className }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current) {
          spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
          lucide.createIcons({ root: spanRef.current });
        }
      }, [name, className]);
      // Usamos display: contents para que el span sea invisible al diseño flex
      return <span ref={spanRef} style={{ display: 'contents' }}></span>;
    };

    // --- COMPONENTE MODAL DE MANUAL DE LA APP ---
    const SystemManualModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 print:hidden">
          <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl transition-colors duration-200">
            <div className="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-between items-center rounded-t-2xl">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-lg">
                  <Icon name="info" className="w-6 h-6" />
                </div>
                <h2 className="text-xl font-bold text-slate-800 dark:text-white">Guía de la Aplicación</h2>
              </div>
              <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>
            
            <div className="p-6 overflow-y-auto space-y-8 bg-white dark:bg-slate-800">
              <section>
                <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-3 border-b dark:border-slate-700 pb-2">¿Cómo funciona?</h3>
                <p className="text-slate-600 dark:text-slate-300 text-sm mb-4 leading-relaxed">
                  Esta aplicación es tu "segundo cerebro". Está diseñada para guardar el paso a paso de trámites, configuraciones o tareas que no haces a menudo y sueles olvidar cómo se hacían.
                </p>
                <ul className="space-y-3 text-sm text-slate-600 dark:text-slate-300">
                  <li className="flex items-start gap-2">
                    <Icon name="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5" />
                    <span><strong>Crear:</strong> Pulsa "Nuevo Manual", añade título, categoría, una imagen (opcional) y los pasos.</span>
                  </li>
                  <li className="flex items-start gap-2">
                    <Icon name="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5" />
                    <span><strong>Buscar:</strong> Usa la barra superior. Buscará en el título y dentro de los pasos.</span>
                  </li>
                  <li className="flex items-start gap-2">
                    <Icon name="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5" />
                    <span><strong>Exportar:</strong> Abre cualquier manual y usa los iconos superiores para guardarlo en PDF o compartirlo.</span>
                  </li>
                </ul>
              </section>

              <section>
                <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-3 border-b dark:border-slate-700 pb-2">Historial de Actualizaciones</h3>
                <div className="space-y-4">
                  
                  <div className="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-xl border border-indigo-100 dark:border-indigo-800/50 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-bold text-indigo-800 dark:text-indigo-300">Versión 1.04</span>
                      <span className="text-xs text-indigo-600 dark:text-indigo-400 font-semibold bg-indigo-100 dark:bg-indigo-900/50 px-2 py-1 rounded-md">17 Julio 2026</span>
                    </div>
                    <ul className="list-disc list-inside text-sm text-slate-700 dark:text-slate-300 space-y-1">
                      <li><strong>Editar Categorías:</strong> Ahora puedes renombrar y cambiar el color de las categorías desde la rueda dentada.</li>
                      <li><strong>Ordenar Manuales:</strong> Posibilidad de ordenar por fecha o alfabéticamente dentro de cada categoría.</li>
                      <li><strong>Opciones de Borrado Separadas:</strong> Ahora puedes elegir entre borrar solo la categoría (moviendo los manuales a "General") o borrar todos los manuales de golpe.</li>
                      <li><strong>Borrado Rápido:</strong> Icono de papelera en las tarjetas para borrar manuales fácilmente.</li>
                    </ul>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-semibold text-slate-700 dark:text-slate-300">Versión 1.03</span>
                      <span className="text-xs text-slate-500 dark:text-slate-400 font-medium">17 Julio 2026</span>
                    </div>
                    <ul className="list-disc list-inside text-sm text-slate-600 dark:text-slate-400 space-y-1">
                      <li><strong>Borrar Categorías:</strong> Ahora puedes eliminar las categorías vacías (que no tengan manuales) pulsando la "X" al seleccionarlas en la pantalla principal.</li>
                    </ul>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-semibold text-slate-700 dark:text-slate-300">Versión 1.02</span>
                      <span className="text-xs text-slate-500 dark:text-slate-400 font-medium">17 Julio 2026</span>
                    </div>
                    <ul className="list-disc list-inside text-sm text-slate-600 dark:text-slate-400 space-y-1">
                      <li><strong>Imágenes:</strong> Posibilidad de adjuntar una foto o captura al crear un manual.</li>
                      <li><strong>Descarga en PDF:</strong> Botón para imprimir/guardar el manual limpio en PDF.</li>
                      <li><strong>Compartir:</strong> Botón para enviar el manual rápidamente (WhatsApp, Email, etc.).</li>
                    </ul>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-semibold text-slate-700 dark:text-slate-300">Versión 1.00</span>
                      <span className="text-xs text-slate-500 dark:text-slate-400 font-medium">17 Julio 2026</span>
                    </div>
                    <ul className="list-disc list-inside text-sm text-slate-600 dark:text-slate-400 space-y-1">
                      <li>Lanzamiento inicial y conexión a Firebase.</li>
                    </ul>
                  </div>
                </div>
              </section>
            </div>
            
            <div className="p-4 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end rounded-b-2xl">
              <button onClick={onClose} className="px-5 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600 rounded-lg shadow-sm transition">
                Entendido
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- COMPONENTE MODAL (Formulario para añadir) ---
    const AddManualModal = ({ isOpen, onClose, onSave, categories }) => {
      const [title, setTitle] = useState('');
      const [category, setCategory] = useState('');
      const [steps, setSteps] = useState(['']);
      const [imageFile, setImageFile] = useState(null);
      const [isSaving, setIsSaving] = useState(false);

      useEffect(() => {
        if (isOpen) {
          setTitle('');
          setCategory('');
          setSteps(['']);
          setImageFile(null);
          setIsSaving(false);
        }
      }, [isOpen]);

      if (!isOpen) return null;

      const handleAddStep = () => setSteps([...steps, '']);
      const handleStepChange = (index, value) => {
        const newSteps = [...steps];
        newSteps[index] = value;
        setSteps(newSteps);
      };
      const handleRemoveStep = (index) => {
        if (steps.length > 1) {
          setSteps(steps.filter((_, i) => i !== index));
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (title.trim() && category.trim() && steps[0].trim()) {
          setIsSaving(true);
          try {
            await onSave({
              title: title.trim(),
              category: category.trim(),
              steps: steps.filter(s => s.trim() !== ''),
              imageFile: imageFile
            });
          } catch (error) {
            console.error("Error al guardar:", error);
            alert("No se pudo guardar: " + error.message);
          } finally {
            setIsSaving(false);
          }
        }
      };

      return (
        <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 print:hidden">
          <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl transition-colors duration-200 relative">
            
            {isSaving && (
              <div className="absolute inset-0 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center rounded-2xl">
                <Icon name="loader-2" className="w-10 h-10 text-indigo-600 animate-spin mb-4" />
                <p className="font-medium text-slate-700 dark:text-slate-200">Guardando manual...</p>
              </div>
            )}

            <div className="p-6 border-b dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/80 rounded-t-2xl">
              <h2 className="text-xl font-bold text-slate-800 dark:text-white">Crear nuevo manual</h2>
              <button onClick={onClose} disabled={isSaving} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition disabled:opacity-50">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>
            
            <form onSubmit={handleSubmit} className="p-6 space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Título del trámite o tarea</label>
                  <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej. Solicitar beca..." className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition" autoFocus required />
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Categoría</label>
                  <input type="text" list="category-suggestions" value={category} onChange={e => setCategory(e.target.value)} placeholder="Ej. Familia, Casa..." className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition" required />
                  <datalist id="category-suggestions">
                    {categories.filter(c => c !== 'Todas').map((c, i) => <option key={i} value={c} />)}
                  </datalist>
                </div>
              </div>

              <div className="space-y-2">
                <label className="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                  <Icon name="image" className="w-4 h-4" /> Imagen adjunta (Opcional)
                </label>
                <div className="flex items-center gap-4">
                  <input 
                    type="file" 
                    accept="image/*" 
                    onChange={(e) => setImageFile(e.target.files[0])}
                    className="block w-full text-sm text-slate-500 dark:text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 dark:file:bg-indigo-900/30 dark:file:text-indigo-400 hover:file:bg-indigo-100 dark:hover:file:bg-indigo-900/50 cursor-pointer transition-all"
                  />
                </div>
              </div>

              <div className="space-y-3">
                <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Pasos a seguir</label>
                {steps.map((step, index) => (
                  <div key={index} className="flex gap-3 items-start group">
                    <div className="w-8 h-8 shrink-0 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-full flex items-center justify-center font-bold text-sm mt-1">
                      {index + 1}
                    </div>
                    <textarea value={step} onChange={e => handleStepChange(index, e.target.value)} placeholder={`Paso ${index + 1}...`} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none min-h-[60px] resize-y dark:text-white transition" required={index === 0} />
                    <button type="button" onClick={() => handleRemoveStep(index)} disabled={steps.length === 1} className="p-3 text-red-400 dark:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition disabled:opacity-30 mt-1">
                      <Icon name="trash-2" className="w-5 h-5" />
                    </button>
                  </div>
                ))}
                <button type="button" onClick={handleAddStep} className="flex items-center gap-2 text-sm font-medium text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 p-2 rounded-lg transition mt-2">
                  <Icon name="plus" className="w-4 h-4" /> Añadir otro paso
                </button>
              </div>
            </form>

            <div className="p-6 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end gap-3 rounded-b-2xl">
              <button type="button" onClick={onClose} disabled={isSaving} className="px-5 py-2.5 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition">Cancelar</button>
              <button onClick={handleSubmit} disabled={isSaving} className="px-5 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600 rounded-lg shadow-sm transition flex items-center gap-2">
                {isSaving ? "Guardando..." : "Guardar Manual"}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- COMPONENTE MODAL DE EDITAR CATEGORÍA ---
    const EditCategoryModal = ({ isOpen, onClose, categoryName, currentSettings, onSave, onDelete }) => {
      const [newName, setNewName] = useState(categoryName);
      const [color, setColor] = useState(currentSettings?.color || 'indigo');
      const [sortBy, setSortBy] = useState(currentSettings?.sortBy || 'date_desc');
      const [deleteMode, setDeleteMode] = useState(null);

      useEffect(() => {
        if (isOpen) {
          setNewName(categoryName);
          setColor(currentSettings?.color || 'indigo');
          setSortBy(currentSettings?.sortBy || 'date_desc');
          setDeleteMode(null);
        }
      }, [isOpen, categoryName, currentSettings]);

      if (!isOpen) return null;

      const colors = [
        { id: 'indigo', bg: 'bg-indigo-500' },
        { id: 'rose', bg: 'bg-rose-500' },
        { id: 'emerald', bg: 'bg-emerald-500' },
        { id: 'amber', bg: 'bg-amber-500' },
        { id: 'cyan', bg: 'bg-cyan-500' },
        { id: 'purple', bg: 'bg-purple-500' },
      ];

      return (
        <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-md shadow-2xl transition-colors duration-200 overflow-hidden">
            <div className="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-between items-center">
              <h2 className="text-xl font-bold text-slate-800 dark:text-white">Editar Categoría</h2>
              <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition">
                <Icon name="x" className="w-5 h-5" />
              </button>
            </div>
            
            <div className="p-6 space-y-6">
              <div className="space-y-2">
                <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Nombre de la categoría</label>
                <input type="text" value={newName} onChange={e => setNewName(e.target.value)} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition" />
              </div>

              <div className="space-y-2">
                <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Color principal</label>
                <div className="flex gap-3">
                  {colors.map(c => (
                    <button key={c.id} onClick={() => setColor(c.id)} className={`w-8 h-8 rounded-full ${c.bg} ${color === c.id ? 'ring-4 ring-offset-2 dark:ring-offset-slate-800 ring-' + c.id + '-500' : 'opacity-70 hover:opacity-100'} transition-all`}></button>
                  ))}
                </div>
              </div>

              <div className="space-y-2">
                <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Ordenar manuales por</label>
                <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition">
                  <option value="date_desc">Más recientes primero</option>
                  <option value="date_asc">Más antiguos primero</option>
                  <option value="alpha_asc">Alfabético (A-Z)</option>
                  <option value="alpha_desc">Alfabético (Z-A)</option>
                </select>
              </div>

              <div className="pt-4 border-t dark:border-slate-700 flex flex-col gap-3">
                {!deleteMode ? (
                  <>
                    <button onClick={() => setDeleteMode('category')} className="w-full p-3 text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/20 hover:bg-orange-100 dark:hover:bg-orange-900/40 rounded-lg font-medium transition flex justify-center items-center gap-2">
                      <Icon name="folder-minus" className="w-5 h-5" /> Borrar solo la categoría
                    </button>
                    <button onClick={() => setDeleteMode('manuals')} className="w-full p-3 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/40 rounded-lg font-medium transition flex justify-center items-center gap-2">
                      <Icon name="trash-2" className="w-5 h-5" /> Borrar manuales de esta categoría
                    </button>
                  </>
                ) : deleteMode === 'category' ? (
                  <div className="space-y-3 p-4 bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800/50 rounded-lg">
                    <p className="text-sm text-orange-700 dark:text-orange-300 font-medium text-center">¿Borrar la categoría "{categoryName}"? Los manuales que contenga se moverán a "General".</p>
                    <div className="flex gap-2">
                      <button onClick={() => setDeleteMode(null)} className="flex-1 p-2 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-lg font-medium border border-slate-200 dark:border-slate-700">Cancelar</button>
                      <button onClick={() => onDelete(categoryName, 'category')} className="flex-1 p-2 bg-orange-600 hover:bg-orange-700 text-white rounded-lg font-medium transition">Sí, borrar</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-3 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800/50 rounded-lg">
                    <p className="text-sm text-red-700 dark:text-red-300 font-medium text-center">¿Seguro? Se borrarán TODOS los manuales de esta categoría (acción irreversible).</p>
                    <div className="flex gap-2">
                      <button onClick={() => setDeleteMode(null)} className="flex-1 p-2 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-lg font-medium border border-slate-200 dark:border-slate-700">Cancelar</button>
                      <button onClick={() => onDelete(categoryName, 'manuals')} className="flex-1 p-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium transition">Sí, borrar</button>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="p-4 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end gap-3">
              <button onClick={onClose} className="px-5 py-2.5 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition">Cancelar</button>
              <button onClick={() => onSave(categoryName, newName, color, sortBy)} className="px-5 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600 rounded-lg transition">Guardar Cambios</button>
            </div>
          </div>
        </div>
      );
    };

    // --- APLICACIÓN PRINCIPAL ---
    const App = () => {
      const [user, setUser] = useState(null);
      const [items, setItems] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [activeCategory, setActiveCategory] = useState('Todas');
      const [customCategories, setCustomCategories] = useState([]);
      const [categorySettings, setCategorySettings] = useState({});
      const [isAddingCategory, setIsAddingCategory] = useState(false);
      const [newCategoryName, setNewCategoryName] = useState('');
      
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [isEditCategoryModalOpen, setIsEditCategoryModalOpen] = useState(false);
      const [categoryToEdit, setCategoryToEdit] = useState('');
      const [selectedItem, setSelectedItem] = useState(null);
      const [isSystemManualOpen, setIsSystemManualOpen] = useState(false);
      const [dbError, setDbError] = useState(null);

      const [isDarkMode, setIsDarkMode] = useState(() => {
        if (typeof window !== 'undefined') {
          const saved = localStorage.getItem('theme');
          if (saved) return saved === 'dark';
          return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        return false;
      });

      useEffect(() => {
        const root = window.document.documentElement;
        if (isDarkMode) {
          root.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          root.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDarkMode]);

      const [isAuthLoading, setIsAuthLoading] = useState(true);

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          setIsAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const handleGoogleSignIn = async () => {
        try {
          const provider = new GoogleAuthProvider();
          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error("Error signing in with Google", error);
          setDbError("Error al iniciar sesión con Google: " + error.message);
        }
      };

      const handleSignOut = async () => {
        try {
          await signOut(auth);
        } catch (error) {
          console.error("Error signing out", error);
        }
      };

      if (isAuthLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900">
            <Icon name="loader-2" className="w-10 h-10 text-indigo-600 animate-spin" />
          </div>
        );
      }

      if (!user) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-900 p-4">
            <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border border-slate-200 dark:border-slate-700">
              <div className="w-16 h-16 bg-indigo-600 dark:bg-indigo-500 rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-6">
                <Icon name="book-open" className="text-white w-8 h-8" />
              </div>
              <h1 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">Mastermind</h1>
              <p className="text-slate-500 dark:text-slate-400 mb-8 text-sm">Tu segundo cerebro. Guarda tus procesos para no olvidarlos jamás.</p>
              
              <button 
                onClick={handleGoogleSignIn}
                className="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 text-slate-700 dark:text-white font-semibold py-3 px-4 rounded-xl transition shadow-sm"
              >
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-5 h-5" />
                Entrar con Google
              </button>
              
              {dbError && (
                <p className="mt-4 text-sm text-red-500 bg-red-50 dark:bg-red-900/30 p-3 rounded-lg border border-red-200 dark:border-red-800 text-left">
                  {dbError}
                </p>
              )}
            </div>
            <p className="mt-8 text-xs text-slate-400 max-w-sm text-center">
              Recuerda añadir la nueva configuración de tu proyecto en el código (variable firebaseConfig).
            </p>
          </div>
        );
      }

      useEffect(() => {
        if (!user) return; 
        
        const manualsPath = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals');
        const categoriesPath = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'categories');
        
        const unsubManuals = onSnapshot(manualsPath, (snapshot) => {
          const loadedItems = snapshot.docs.map(docSnap => docSnap.data());
          loadedItems.sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));
          setItems(loadedItems);
          setDbError(null);
        }, (err) => {
          console.error("Error manuales:", err);
          if (err.code === 'permission-denied') {
            setDbError('⚠️ Error de permisos. Ve a Firebase > Firestore > Reglas y ponlas en modo lectura/escritura (true).');
          }
        });

        const unsubCategories = onSnapshot(categoriesPath, (docSnap) => {
          if (docSnap.exists()) {
            if (docSnap.data().custom) setCustomCategories(docSnap.data().custom);
            if (docSnap.data().settings) setCategorySettings(docSnap.data().settings);
          }
        });

        return () => {
          unsubManuals();
          unsubCategories();
        };
      }, [user]);

      const categories = useMemo(() => {
        const cats = new Set([...items.map(item => item.category), ...customCategories]);
        return ['Todas', ...Array.from(cats)].sort();
      }, [items, customCategories]);

      const filteredItems = useMemo(() => {
        let result = items.filter(item => {
          const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                item.steps.some(step => step.toLowerCase().includes(searchQuery.toLowerCase()));
          const matchesCategory = activeCategory === 'Todas' || item.category === activeCategory;
          return matchesSearch && matchesCategory;
        });

        const sortPref = activeCategory !== 'Todas' && categorySettings[activeCategory] 
          ? categorySettings[activeCategory].sortBy 
          : 'date_desc';

        result.sort((a, b) => {
          if (sortPref === 'date_asc') return new Date(a.lastUpdated) - new Date(b.lastUpdated);
          if (sortPref === 'alpha_asc') return a.title.localeCompare(b.title);
          if (sortPref === 'alpha_desc') return b.title.localeCompare(a.title);
          return new Date(b.lastUpdated) - new Date(a.lastUpdated); 
        });

        return result;
      }, [items, searchQuery, activeCategory, categorySettings]);

      const handleSaveNewCategory = async () => {
        if (newCategoryName.trim() && user) {
          const newCustom = [...customCategories, newCategoryName.trim()];
          setCustomCategories(newCustom);
          setActiveCategory(newCategoryName.trim());
          const categoryDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'categories');
          await setDoc(categoryDocRef, { custom: newCustom, settings: categorySettings }, { merge: true });
        }
        setIsAddingCategory(false);
        setNewCategoryName('');
      };

      const handleSaveEditCategory = async (oldName, newName, color, sortBy) => {
        if (!user) return;
        
        let finalName = oldName;
        if (newName.trim() && newName.trim() !== oldName) {
          finalName = newName.trim();
          const itemsToUpdate = items.filter(item => item.category === oldName);
          for (const item of itemsToUpdate) {
            await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', item.id), { category: finalName });
          }
        }

        let newCustom = [...customCategories];
        if (finalName !== oldName) {
           newCustom = newCustom.filter(c => c !== oldName);
           if (!newCustom.includes(finalName)) newCustom.push(finalName);
        }

        const newSettings = { ...categorySettings };
        if (finalName !== oldName) delete newSettings[oldName];
        newSettings[finalName] = { color, sortBy };

        setCustomCategories(newCustom);
        setCategorySettings(newSettings);
        setActiveCategory(finalName);
        setIsEditCategoryModalOpen(false);
        
        const categoryDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'categories');
        await setDoc(categoryDocRef, { custom: newCustom, settings: newSettings });
      };

      const handleDeleteCategory = async (catToDelete, mode = 'both') => {
        if (!user) return;
        
        if (mode === 'manuals' || mode === 'both') {
          const itemsToDelete = items.filter(item => item.category === catToDelete);
          for (const item of itemsToDelete) {
            await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', item.id));
          }
          if (mode === 'manuals') {
            setIsEditCategoryModalOpen(false);
            return;
          }
        }

        if (mode === 'category' || mode === 'both') {
          if (mode === 'category') {
            const itemsToMove = items.filter(item => item.category === catToDelete);
            for (const item of itemsToMove) {
              await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', item.id), { category: 'General' });
            }
          }

          const newCustom = customCategories.filter(c => c !== catToDelete);
          const newSettings = { ...categorySettings };
          delete newSettings[catToDelete];

          setCustomCategories(newCustom);
          setCategorySettings(newSettings);
          setActiveCategory('Todas');
          setIsEditCategoryModalOpen(false);
          
          const categoryDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'categories');
          await setDoc(categoryDocRef, { custom: newCustom, settings: newSettings });
        }
      };

      const handleAddItem = async (newItemData) => {
        if (!user) return;
        const newId = Math.random().toString(36).substr(2, 9);
        
        let imageUrl = null;
        
        try {
          if (newItemData.imageFile) {
            const imgRef = storageRef(storage, `usuarios/${user.uid}/manuales/${newId}/${newItemData.imageFile.name}`);
            await uploadBytesResumable(imgRef, newItemData.imageFile);
            imageUrl = await getDownloadURL(imgRef);
          }

          const newItem = {
            title: newItemData.title,
            category: newItemData.category,
            steps: newItemData.steps,
            imageUrl: imageUrl, 
            id: newId,
            lastUpdated: new Date().toISOString().split('T')[0]
          };
          
          const manualDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', newId);
          await setDoc(manualDocRef, newItem);
          setIsAddModalOpen(false);
        } catch (err) {
          console.error("Error guardando el manual:", err);
          alert("Hubo un problema al guardar. Si añadiste una foto, asegúrate de haber activado 'Storage' en Firebase. Detalle: " + err.message);
        }
      };

      const handleDeleteItem = async (id) => {
        if (!user) return;
        setSelectedItem(null);
        try {
          const manualDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', id);
          await deleteDoc(manualDocRef);
        } catch (err) {
          console.error("Error borrando el manual:", err);
        }
      };

      const handleShare = async () => {
        if (!selectedItem) return;
        if (navigator.share) {
          try {
            await navigator.share({
              title: selectedItem.title,
              text: `Mira este manual que he guardado: ${selectedItem.title} (${selectedItem.category})`,
              url: window.location.href, 
            });
          } catch (err) {
            console.log('Compartir cancelado o error:', err);
          }
        } else {
          alert('Tu navegador no soporta la función de compartir de forma nativa.');
        }
      };

      return (
        <div className="min-h-screen">
          <header className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 sticky top-0 z-30 shadow-sm transition-colors duration-200 print:hidden">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div className="flex items-center gap-3 w-full sm:w-auto">
                  <div className="w-10 h-10 bg-indigo-600 dark:bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shrink-0">
                    <Icon name="book-open" className="text-white w-6 h-6" />
                  </div>
                  <div>
                    <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-indigo-500 dark:from-indigo-400 dark:to-indigo-300">Mastermind</h1>
                    <p className="text-xs text-slate-500 dark:text-slate-400 font-medium tracking-wide uppercase">Tu segundo cerebro</p>
                  </div>
                </div>
                
                <div className="w-full sm:w-auto flex gap-3">
                  <div className="relative w-full sm:w-72">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <Icon name="search" className="h-4 w-4 text-slate-400 dark:text-slate-500" />
                    </div>
                    <input 
                      type="text" 
                      placeholder="Buscar un trámite..." 
                      className="block w-full pl-10 pr-3 py-2 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition dark:text-white"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                  </div>
                  
                  <button onClick={() => setIsSystemManualOpen(true)} className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition flex-shrink-0">
                    <Icon name="help-circle" className="w-5 h-5" />
                  </button>

                  <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition flex-shrink-0">
                    {isDarkMode ? <Icon name="sun" className="w-5 h-5" /> : <Icon name="moon" className="w-5 h-5" />}
                  </button>

                  <button onClick={() => setIsAddModalOpen(true)} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm font-semibold transition shrink-0 mr-2">
                    <Icon name="plus" className="w-4 h-4" /> <span className="hidden sm:inline">Nuevo Manual</span>
                  </button>

                  <div className="flex items-center gap-2 border-l dark:border-slate-700 pl-3">
                    {user && user.photoURL && (
                      <img src={user.photoURL} alt="Perfil" className="w-8 h-8 rounded-full border border-slate-200 dark:border-slate-600 shadow-sm" />
                    )}
                    <button onClick={handleSignOut} className="p-2 text-slate-400 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl transition flex-shrink-0" title="Cerrar Sesión">
                      <Icon name="log-out" className="w-5 h-5" />
                    </button>
                  </div>
                </div>
              </div>

              <div className="mt-6 flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                {categories.map(cat => {
                  const settings = categorySettings[cat] || { color: 'indigo' };
                  const colorStyles = {
                    indigo: 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 ring-1 ring-indigo-200 dark:ring-indigo-700',
                    emerald: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-300 ring-1 ring-emerald-200 dark:ring-emerald-700',
                    rose: 'bg-rose-100 text-rose-700 dark:bg-rose-900/50 dark:text-rose-300 ring-1 ring-rose-200 dark:ring-rose-700',
                    amber: 'bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-300 ring-1 ring-amber-200 dark:ring-amber-700',
                    cyan: 'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/50 dark:text-cyan-300 ring-1 ring-cyan-200 dark:ring-cyan-700',
                    purple: 'bg-purple-100 text-purple-700 dark:bg-purple-900/50 dark:text-purple-300 ring-1 ring-purple-200 dark:ring-purple-700',
                  };
                  
                  const activeClass = cat !== 'Todas' ? (colorStyles[settings.color] || colorStyles.indigo) : colorStyles.indigo;
                  
                  return (
                    <button 
                      key={cat}
                      onClick={() => setActiveCategory(cat)}
                      className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all shrink-0 flex items-center gap-1 ${
                        activeCategory === cat 
                          ? activeClass
                          : 'bg-white text-slate-600 border border-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700'
                      }`}
                    >
                      {cat}
                      {activeCategory === cat && cat !== 'Todas' && (
                        <div 
                          onClick={(e) => { e.stopPropagation(); setCategoryToEdit(cat); setIsEditCategoryModalOpen(true); }}
                          className="p-1 -mr-2 ml-1 rounded-full hover:bg-black/10 dark:hover:bg-white/10 transition-colors"
                          title="Editar categoría"
                        >
                          <Icon name="settings" className="w-3 h-3" />
                        </div>
                      )}
                    </button>
                  );
                })}
                
                {isAddingCategory ? (
                  <div className="flex items-center gap-1 bg-white dark:bg-slate-800 border border-indigo-200 dark:border-indigo-700 rounded-full pl-3 pr-1 py-1 shrink-0">
                    <input 
                      type="text" 
                      autoFocus
                      placeholder="Nombre..."
                      className="text-sm outline-none bg-transparent w-24 text-slate-700 dark:text-slate-200"
                      value={newCategoryName}
                      onChange={(e) => setNewCategoryName(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleSaveNewCategory()}
                    />
                    <button onClick={handleSaveNewCategory} className="p-1 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-full">
                      <Icon name="check" className="w-3 h-3" />
                    </button>
                  </div>
                ) : (
                  <button onClick={() => setIsAddingCategory(true)} className="px-3 py-1.5 rounded-full text-sm font-medium border border-dashed border-slate-300 dark:border-slate-600 text-slate-500 shrink-0 flex items-center gap-1">
                    <Icon name="plus" className="w-3 h-3" /> Añadir
                  </button>
                )}
              </div>
            
              {dbError && (
                <div className="mt-4 p-3 bg-red-100 dark:bg-red-900/30 border border-red-300 dark:border-red-800 text-red-700 dark:text-red-400 rounded-lg text-sm flex items-center gap-2">
                  <Icon name="alert-circle" className="w-5 h-5 shrink-0" /> <p className="font-medium">{dbError}</p>
                </div>
              )}
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 print:hidden">
            {filteredItems.length === 0 ? (
              <div className="text-center py-20 bg-white dark:bg-slate-800 rounded-2xl border border-dashed border-slate-300 dark:border-slate-600">
                <Icon name="book-dashed" className="mx-auto h-12 w-12 text-slate-300 mb-4" />
                <h3 className="text-lg font-medium text-slate-900 dark:text-slate-100">No hay manuales</h3>
                <p className="text-slate-500 mt-1">Añade tu primer manual para empezar.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {filteredItems.map(item => (
                  <div key={item.id} onClick={() => setSelectedItem(item)} className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 hover:border-indigo-300 transition-all cursor-pointer group flex flex-col h-full relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1.5 h-full bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    
                    <button 
                      onClick={(e) => { e.stopPropagation(); handleDeleteItem(item.id); }}
                      className="absolute top-3 right-3 p-2 bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity z-10 hover:bg-red-200 dark:hover:bg-red-900"
                      title="Borrar manual"
                    >
                      <Icon name="trash-2" className="w-4 h-4" />
                    </button>

                    {item.imageUrl && (
                      <div className="w-full h-32 mb-4 bg-slate-100 dark:bg-slate-900 rounded-lg overflow-hidden border border-slate-100 dark:border-slate-700">
                        <img src={item.imageUrl} alt="Miniatura" className="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity" />
                      </div>
                    )}

                    <div className="flex justify-between items-start mb-4">
                      <span className="inline-block px-3 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-bold rounded-lg uppercase">{item.category}</span>
                      <span className="text-xs text-slate-400 font-medium flex items-center gap-1">
                        <Icon name="calendar" className="w-3 h-3" /> {item.lastUpdated}
                      </span>
                    </div>
                    <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-3 group-hover:text-indigo-700 transition-colors">{item.title}</h3>
                    <p className="text-sm text-slate-500 mt-auto bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700/50 line-clamp-2">
                      <span className="font-semibold text-slate-700 dark:text-slate-300">Paso 1:</span> {item.steps[0]}
                    </p>
                  </div>
                ))}
              </div>
            )}
          </main>

          {selectedItem && (
            <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 print:static print:bg-transparent print:p-0 print:block">
              <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl transition-colors duration-200 print:shadow-none print:max-w-none print:border-none print:overflow-visible print:max-h-none print:bg-white print:text-black">
                
                <div className="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 print:bg-white print:border-slate-300 flex justify-between items-start">
                  <div>
                    <span className="inline-block px-3 py-1 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 print:bg-slate-100 print:text-slate-700 print:border print:border-slate-300 text-xs font-bold rounded-lg uppercase mb-3">
                      {selectedItem.category}
                    </span>
                    <h2 className="text-2xl font-bold text-slate-800 dark:text-white print:text-black leading-tight pr-4">{selectedItem.title}</h2>
                    <p className="text-sm text-slate-500 dark:text-slate-400 print:text-slate-600 mt-2 font-medium flex items-center gap-1">
                      <Icon name="clock" className="w-4 h-4" /> Última actualización: {selectedItem.lastUpdated}
                    </p>
                  </div>
                  
                  <div className="flex gap-1 flex-shrink-0 print:hidden">
                    <button onClick={handleShare} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-full transition" title="Compartir">
                      <Icon name="share-2" className="w-5 h-5" />
                    </button>
                    <button onClick={() => window.print()} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-full transition" title="Descargar PDF">
                      <Icon name="download" className="w-5 h-5" />
                    </button>
                    <div className="w-px h-6 bg-slate-200 dark:bg-slate-700 my-auto mx-1"></div>
                    <button onClick={() => handleDeleteItem(selectedItem.id)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-full transition" title="Borrar">
                      <Icon name="trash-2" className="w-5 h-5" />
                    </button>
                    <button onClick={() => setSelectedItem(null)} className="p-2 text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 rounded-full transition ml-1">
                      <Icon name="x" className="w-5 h-5" />
                    </button>
                  </div>
                </div>
                
                <div className="p-6 overflow-y-auto bg-white dark:bg-slate-800 print:overflow-visible print:bg-white">
                  {selectedItem.imageUrl && (
                    <div className="mb-8 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 print:border-slate-300">
                      <img src={selectedItem.imageUrl} alt="Imagen adjunta" className="w-full h-auto object-contain max-h-[400px] bg-slate-50 dark:bg-slate-900 print:bg-white" />
                    </div>
                  )}

                  <div className="space-y-6">
                    {selectedItem.steps.map((step, index) => (
                      <div key={index} className="flex gap-4 print:break-inside-avoid">
                        <div className="w-10 h-10 shrink-0 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 print:bg-white print:text-black print:border-2 print:border-slate-800 rounded-2xl flex items-center justify-center font-bold text-lg border border-indigo-100">
                          {index + 1}
                        </div>
                        <div className="pt-2 text-slate-700 dark:text-slate-200 print:text-black leading-relaxed whitespace-pre-wrap text-base">
                          {step}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                
                <div className="p-6 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end rounded-b-2xl print:hidden">
                  <button onClick={() => setSelectedItem(null)} className="px-6 py-2.5 bg-slate-800 dark:bg-indigo-600 hover:bg-slate-900 text-white font-medium rounded-xl transition">
                    Cerrar
                  </button>
                </div>
              </div>
            </div>
          )}
          
          <AddManualModal isOpen={isAddModalOpen} onClose={() => setIsAddModalOpen(false)} onSave={handleAddItem} categories={categories} />
          <EditCategoryModal 
            isOpen={isEditCategoryModalOpen} 
            onClose={() => setIsEditCategoryModalOpen(false)} 
            categoryName={categoryToEdit} 
            currentSettings={categorySettings[categoryToEdit]} 
            onSave={handleSaveEditCategory} 
            onDelete={handleDeleteCategory}
          />
          <SystemManualModal isOpen={isSystemManualOpen} onClose={() => setIsSystemManualOpen(false)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
