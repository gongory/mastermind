<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Manual Personal</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  
  <!-- Iconos Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Import Map (Añadido storage) -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js"
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 antialiased selection:bg-indigo-100 selection:text-indigo-900 dark:selection:bg-indigo-900 dark:selection:text-indigo-100 transition-colors duration-200 print:bg-white print:text-black">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInAnonymously } from "firebase/auth";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "firebase/firestore";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "firebase/storage";

    const { useState, useEffect, useMemo } = React;

    // Tus claves reales de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCNOQYnMAJ5iW5ON0D1A1cElAji0C41Sms",
      authDomain: "home-finance-ee8fd.firebaseapp.com",
      projectId: "home-finance-ee8fd",
      storageBucket: "home-finance-ee8fd.firebasestorage.app",
      messagingSenderId: "484237400024",
      appId: "1:484237400024:web:36c2a0021b0d0ed79e84ad"
    };

    const APP_ID = "mi-manual-personal";

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app); // Inicializamos Storage

    // --- COMPONENTE MODAL DE MANUAL DE LA APP ---
    const SystemManualModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 print:hidden">
          <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl transition-colors duration-200">
            <div className="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-between items-center rounded-t-2xl">
              <div className="flex items-center gap-3">
                <div className="p-2 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-lg">
                  <i data-lucide="info" className="w-6 h-6"></i>
                </div>
                <h2 className="text-xl font-bold text-slate-800 dark:text-white">Guía de la Aplicación</h2>
              </div>
              <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition">
                <i data-lucide="x" className="w-5 h-5"></i>
              </button>
            </div>
            
            <div className="p-6 overflow-y-auto space-y-8 bg-white dark:bg-slate-800">
              
              <section>
                <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-3 border-b dark:border-slate-700 pb-2">¿Cómo funciona?</h3>
                <p className="text-slate-600 dark:text-slate-300 text-sm mb-4 leading-relaxed">
                  Esta aplicación es tu "segundo cerebro". Está diseñada para guardar el paso a paso de trámites, configuraciones o tareas que no haces a menudo y sueles olvidar cómo se hacían.
                </p>
                <ul className="space-y-3 text-sm text-slate-600 dark:text-slate-300">
                  <li className="flex items-start gap-2">
                    <i data-lucide="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5"></i>
                    <span><strong>Crear:</strong> Pulsa "Nuevo Manual", añade título, categoría, una imagen (opcional) y los pasos.</span>
                  </li>
                  <li className="flex items-start gap-2">
                    <i data-lucide="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5"></i>
                    <span><strong>Buscar:</strong> Usa la barra superior. Buscará en el título y dentro de los pasos.</span>
                  </li>
                  <li className="flex items-start gap-2">
                    <i data-lucide="check-circle-2" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5"></i>
                    <span><strong>Exportar:</strong> Abre cualquier manual y usa los iconos superiores para guardarlo en PDF o compartirlo.</span>
                  </li>
                </ul>
              </section>

              <section>
                <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-3 border-b dark:border-slate-700 pb-2">Historial de Actualizaciones</h3>
                <div className="space-y-4">
                  
                  <div className="bg-indigo-50 dark:bg-indigo-900/30 p-4 rounded-xl border border-indigo-100 dark:border-indigo-800/50 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-bold text-indigo-800 dark:text-indigo-300">Versión 1.02</span>
                      <span className="text-xs text-indigo-600 dark:text-indigo-400 font-semibold bg-indigo-100 dark:bg-indigo-900/50 px-2 py-1 rounded-md">17 Julio 2026</span>
                    </div>
                    <ul className="list-disc list-inside text-sm text-slate-700 dark:text-slate-300 space-y-1">
                      <li><strong>Imágenes:</strong> Posibilidad de adjuntar una foto o captura al crear un manual.</li>
                      <li><strong>Descarga en PDF:</strong> Botón para imprimir/guardar el manual limpio en PDF.</li>
                      <li><strong>Compartir:</strong> Botón para enviar el manual rápidamente (WhatsApp, Email, etc.).</li>
                    </ul>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-semibold text-slate-700 dark:text-slate-300">Versión 1.01</span>
                      <span className="text-xs text-slate-500 dark:text-slate-400 font-medium">17 Julio 2026</span>
                    </div>
                    <ul className="list-disc list-inside text-sm text-slate-600 dark:text-slate-400 space-y-1">
                      <li>Añadido modo oscuro con guardado de preferencias.</li>
                      <li>Creación de este registro de actualizaciones (changelog).</li>
                    </ul>
                  </div>

                  <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                    <div className="flex items-center justify-between mb-2">
                      <span className="font-semibold text-slate-700 dark:text-slate-300">Versión 1.00</span>
                      <span className="text-xs text-slate-500 dark:text-slate-400 font-medium">17 Julio 2026</span>
                    </div>
                    <ul className="list-disc list-inside text-sm text-slate-600 dark:text-slate-400 space-y-1">
                      <li>Lanzamiento inicial.</li>
                      <li>Conexión a base de datos segura en Firebase.</li>
                      <li>Categorías personalizadas y buscador avanzado.</li>
                    </ul>
                  </div>

                </div>
              </section>

            </div>
            
            <div className="p-4 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end rounded-b-2xl">
              <button onClick={onClose} className="px-5 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600 rounded-lg shadow-sm transition">
                Entendido
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- COMPONENTE MODAL (Formulario para añadir) ---
    const AddManualModal = ({ isOpen, onClose, onSave, categories }) => {
      const [title, setTitle] = useState('');
      const [category, setCategory] = useState('');
      const [steps, setSteps] = useState(['']);
      const [imageFile, setImageFile] = useState(null); // Nuevo estado para la imagen
      const [isSaving, setIsSaving] = useState(false); // Estado de carga

      useEffect(() => {
        if (isOpen) {
          setTitle('');
          setCategory('');
          setSteps(['']);
          setImageFile(null);
          setIsSaving(false);
          setTimeout(() => lucide.createIcons(), 0);
        }
      }, [isOpen]);

      if (!isOpen) return null;

      const handleAddStep = () => setSteps([...steps, '']);
      const handleStepChange = (index, value) => {
        const newSteps = [...steps];
        newSteps[index] = value;
        setSteps(newSteps);
      };
      const handleRemoveStep = (index) => {
        if (steps.length > 1) {
          setSteps(steps.filter((_, i) => i !== index));
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (title.trim() && category.trim() && steps[0].trim()) {
          setIsSaving(true);
          await onSave({
            title: title.trim(),
            category: category.trim(),
            steps: steps.filter(s => s.trim() !== ''),
            imageFile: imageFile
          });
          setIsSaving(false);
        }
      };

      return (
        <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 print:hidden">
          <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl transition-colors duration-200 relative">
            
            {isSaving && (
              <div className="absolute inset-0 bg-white/80 dark:bg-slate-800/80 backdrop-blur-sm z-10 flex flex-col items-center justify-center rounded-2xl">
                <i data-lucide="loader-2" className="w-10 h-10 text-indigo-600 animate-spin mb-4"></i>
                <p className="font-medium text-slate-700 dark:text-slate-200">Guardando manual...</p>
              </div>
            )}

            <div className="p-6 border-b dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/80 rounded-t-2xl">
              <h2 className="text-xl font-bold text-slate-800 dark:text-white">Crear nuevo manual</h2>
              <button onClick={onClose} disabled={isSaving} className="p-2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-full transition disabled:opacity-50">
                <i data-lucide="x" className="w-5 h-5"></i>
              </button>
            </div>
            
            <form onSubmit={handleSubmit} className="p-6 space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Título del trámite o tarea</label>
                  <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="Ej. Solicitar beca..." className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition" autoFocus required />
                </div>
                <div className="space-y-2">
                  <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Categoría</label>
                  <input type="text" list="category-suggestions" value={category} onChange={e => setCategory(e.target.value)} placeholder="Ej. Familia, Casa..." className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition" required />
                  <datalist id="category-suggestions">
                    {categories.filter(c => c !== 'Todas').map((c, i) => <option key={i} value={c} />)}
                  </datalist>
                </div>
              </div>

              {/* Selector de Imagen */}
              <div className="space-y-2">
                <label className="text-sm font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                  <i data-lucide="image" className="w-4 h-4"></i> Imagen adjunta (Opcional)
                </label>
                <div className="flex items-center gap-4">
                  <input 
                    type="file" 
                    accept="image/*" 
                    onChange={(e) => setImageFile(e.target.files[0])}
                    className="block w-full text-sm text-slate-500 dark:text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 dark:file:bg-indigo-900/30 dark:file:text-indigo-400 hover:file:bg-indigo-100 dark:hover:file:bg-indigo-900/50 cursor-pointer transition-all"
                  />
                </div>
              </div>

              <div className="space-y-3">
                <label className="text-sm font-semibold text-slate-700 dark:text-slate-300">Pasos a seguir</label>
                {steps.map((step, index) => (
                  <div key={index} className="flex gap-3 items-start group">
                    <div className="w-8 h-8 shrink-0 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-full flex items-center justify-center font-bold text-sm mt-1">
                      {index + 1}
                    </div>
                    <textarea value={step} onChange={e => handleStepChange(index, e.target.value)} placeholder={`Paso ${index + 1}...`} className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none min-h-[60px] resize-y dark:text-white transition" required={index === 0} />
                    <button type="button" onClick={() => handleRemoveStep(index)} disabled={steps.length === 1} className="p-3 text-red-400 dark:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition disabled:opacity-30 mt-1">
                      <i data-lucide="trash-2" className="w-5 h-5"></i>
                    </button>
                  </div>
                ))}
                <button type="button" onClick={handleAddStep} className="flex items-center gap-2 text-sm font-medium text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 p-2 rounded-lg transition mt-2">
                  <i data-lucide="plus" className="w-4 h-4"></i> Añadir otro paso
                </button>
              </div>
            </form>

            <div className="p-6 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end gap-3 rounded-b-2xl">
              <button type="button" onClick={onClose} disabled={isSaving} className="px-5 py-2.5 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition">Cancelar</button>
              <button onClick={handleSubmit} disabled={isSaving} className="px-5 py-2.5 bg-indigo-600 dark:bg-indigo-500 text-white font-medium hover:bg-indigo-700 dark:hover:bg-indigo-600 rounded-lg shadow-sm transition flex items-center gap-2">
                {isSaving ? "Guardando..." : "Guardar Manual"}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- APLICACIÓN PRINCIPAL ---
    const App = () => {
      const [user, setUser] = useState(null);
      const [items, setItems] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [activeCategory, setActiveCategory] = useState('Todas');
      const [customCategories, setCustomCategories] = useState([]);
      const [isAddingCategory, setIsAddingCategory] = useState(false);
      const [newCategoryName, setNewCategoryName] = useState('');
      
      const [isAddModalOpen, setIsAddModalOpen] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [isSystemManualOpen, setIsSystemManualOpen] = useState(false);
      const [dbError, setDbError] = useState(null);

      const [isDarkMode, setIsDarkMode] = useState(() => {
        if (typeof window !== 'undefined') {
          const saved = localStorage.getItem('theme');
          if (saved) return saved === 'dark';
          return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        return false;
      });

      useEffect(() => {
        const root = window.document.documentElement;
        if (isDarkMode) {
          root.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          root.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDarkMode]);

      useEffect(() => {
        lucide.createIcons();
      });

      useEffect(() => {
        const authenticate = async () => {
          try {
            const userCredential = await signInAnonymously(auth);
            setUser(userCredential.user);
          } catch (error) {
            console.error("Error Auth:", error);
            setDbError("No se ha podido conectar. Comprueba tu conexión o las reglas de Firebase.");
          }
        };
        authenticate();
      }, []);

      useEffect(() => {
        if (!user) return; 
        
        const manualsPath = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals');
        const categoriesPath = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'categories');
        
        const unsubManuals = onSnapshot(manualsPath, (snapshot) => {
          const loadedItems = snapshot.docs.map(docSnap => docSnap.data());
          loadedItems.sort((a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));
          setItems(loadedItems);
          setDbError(null);
        }, (err) => {
          console.error("Error manuales:", err);
          if (err.code === 'permission-denied') {
            setDbError('⚠️ Error de permisos. Ve a Firebase > Firestore > Reglas y ponlas en modo lectura/escritura (true).');
          }
        });

        const unsubCategories = onSnapshot(categoriesPath, (docSnap) => {
          if (docSnap.exists() && docSnap.data().custom) {
            setCustomCategories(docSnap.data().custom);
          }
        });

        return () => {
          unsubManuals();
          unsubCategories();
        };
      }, [user]);

      const categories = useMemo(() => {
        const cats = new Set([...items.map(item => item.category), ...customCategories]);
        return ['Todas', ...Array.from(cats)].sort();
      }, [items, customCategories]);

      const filteredItems = useMemo(() => {
        return items.filter(item => {
          const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                item.steps.some(step => step.toLowerCase().includes(searchQuery.toLowerCase()));
          const matchesCategory = activeCategory === 'Todas' || item.category === activeCategory;
          return matchesSearch && matchesCategory;
        });
      }, [items, searchQuery, activeCategory]);

      const handleSaveNewCategory = async () => {
        if (newCategoryName.trim() && user) {
          const newCustom = [...customCategories, newCategoryName.trim()];
          setCustomCategories(newCustom);
          setActiveCategory(newCategoryName.trim());
          const categoryDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'settings', 'categories');
          await setDoc(categoryDocRef, { custom: newCustom });
        }
        setIsAddingCategory(false);
        setNewCategoryName('');
      };

      const handleAddItem = async (newItemData) => {
        if (!user) return;
        const newId = Math.random().toString(36).substr(2, 9);
        
        let imageUrl = null;
        
        // Si hay imagen, subirla primero a Storage
        if (newItemData.imageFile) {
          try {
            const imgRef = storageRef(storage, `usuarios/${user.uid}/manuales/${newId}/${newItemData.imageFile.name}`);
            await uploadBytesResumable(imgRef, newItemData.imageFile);
            imageUrl = await getDownloadURL(imgRef);
          } catch (err) {
            console.error("Error subiendo imagen. ¿Activaste Storage en Firebase?", err);
            alert("Error subiendo imagen. Asegúrate de habilitar Firebase Storage en tu consola.");
          }
        }

        const newItem = {
          title: newItemData.title,
          category: newItemData.category,
          steps: newItemData.steps,
          imageUrl: imageUrl, // Guardamos la URL
          id: newId,
          lastUpdated: new Date().toISOString().split('T')[0]
        };
        
        const manualDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', newId);
        await setDoc(manualDocRef, newItem);
        setIsAddModalOpen(false);
      };

      const handleDeleteItem = async (id) => {
        if (!user) return;
        setSelectedItem(null);
        const manualDocRef = doc(db, 'artifacts', APP_ID, 'users', user.uid, 'manuals', id);
        await deleteDoc(manualDocRef);
      };

      // Función para compartir
      const handleShare = async () => {
        if (!selectedItem) return;
        if (navigator.share) {
          try {
            await navigator.share({
              title: selectedItem.title,
              text: `Mira este manual que he guardado: ${selectedItem.title} (${selectedItem.category})`,
              url: window.location.href, // Compartirá la URL actual donde esté alojada la app
            });
          } catch (err) {
            console.log('Compartir cancelado o error:', err);
          }
        } else {
          alert('Tu navegador no soporta la función de compartir de forma nativa.');
        }
      };

      return (
        <div className="min-h-screen">
          {/* Ocultamos el header al imprimir en PDF */}
          <header className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 sticky top-0 z-30 shadow-sm transition-colors duration-200 print:hidden">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
              <div className="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div className="flex items-center gap-3 w-full sm:w-auto">
                  <div className="w-10 h-10 bg-indigo-600 dark:bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shrink-0">
                    <i data-lucide="book-open" className="text-white w-6 h-6"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-indigo-500 dark:from-indigo-400 dark:to-indigo-300">Mi Manual Personal</h1>
                    <p className="text-xs text-slate-500 dark:text-slate-400 font-medium tracking-wide uppercase">Tu segundo cerebro</p>
                  </div>
                </div>
                
                <div className="w-full sm:w-auto flex gap-3">
                  <div className="relative w-full sm:w-72">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <i data-lucide="search" className="h-4 w-4 text-slate-400 dark:text-slate-500"></i>
                    </div>
                    <input 
                      type="text" 
                      placeholder="Buscar un trámite..." 
                      className="block w-full pl-10 pr-3 py-2 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition dark:text-white"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                  </div>
                  
                  <button onClick={() => setIsSystemManualOpen(true)} className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition flex-shrink-0">
                    <i data-lucide="help-circle" className="w-5 h-5"></i>
                  </button>

                  <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition flex-shrink-0">
                    {isDarkMode ? <i data-lucide="sun" className="w-5 h-5"></i> : <i data-lucide="moon" className="w-5 h-5"></i>}
                  </button>

                  <button onClick={() => setIsAddModalOpen(true)} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm font-semibold transition shrink-0">
                    <i data-lucide="plus" className="w-4 h-4"></i> <span className="hidden sm:inline">Nuevo Manual</span>
                  </button>
                </div>
              </div>

              <div className="mt-6 flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                {categories.map(cat => (
                  <button 
                    key={cat}
                    onClick={() => setActiveCategory(cat)}
                    className={`px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all shrink-0 ${
                      activeCategory === cat 
                        ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 ring-1 ring-indigo-200 dark:ring-indigo-700' 
                        : 'bg-white text-slate-600 border border-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700'
                    }`}
                  >
                    {cat}
                  </button>
                ))}
                
                {isAddingCategory ? (
                  <div className="flex items-center gap-1 bg-white dark:bg-slate-800 border border-indigo-200 dark:border-indigo-700 rounded-full pl-3 pr-1 py-1 shrink-0">
                    <input 
                      type="text" 
                      autoFocus
                      placeholder="Nombre..."
                      className="text-sm outline-none bg-transparent w-24 text-slate-700 dark:text-slate-200"
                      value={newCategoryName}
                      onChange={(e) => setNewCategoryName(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleSaveNewCategory()}
                    />
                    <button onClick={handleSaveNewCategory} className="p-1 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-400 rounded-full">
                      <i data-lucide="check" className="w-3 h-3"></i>
                    </button>
                  </div>
                ) : (
                  <button onClick={() => setIsAddingCategory(true)} className="px-3 py-1.5 rounded-full text-sm font-medium border border-dashed border-slate-300 dark:border-slate-600 text-slate-500 shrink-0 flex items-center gap-1">
                    <i data-lucide="plus" className="w-3 h-3"></i> Añadir
                  </button>
                )}
              </div>
            
              {dbError && (
                <div className="mt-4 p-3 bg-red-100 dark:bg-red-900/30 border border-red-300 dark:border-red-800 text-red-700 dark:text-red-400 rounded-lg text-sm flex items-center gap-2">
                  <i data-lucide="alert-circle" className="w-5 h-5 shrink-0"></i> <p className="font-medium">{dbError}</p>
                </div>
              )}
            </div>
          </header>

          {/* Ocultamos el listado principal al imprimir */}
          <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 print:hidden">
            {filteredItems.length === 0 ? (
              <div className="text-center py-20 bg-white dark:bg-slate-800 rounded-2xl border border-dashed border-slate-300 dark:border-slate-600">
                <i data-lucide="book-dashed" className="mx-auto h-12 w-12 text-slate-300 mb-4"></i>
                <h3 className="text-lg font-medium text-slate-900 dark:text-slate-100">No hay manuales</h3>
                <p className="text-slate-500 mt-1">Añade tu primer manual para empezar.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {filteredItems.map(item => (
                  <div key={item.id} onClick={() => setSelectedItem(item)} className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 hover:border-indigo-300 transition-all cursor-pointer group flex flex-col h-full relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1.5 h-full bg-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    
                    {/* Miniatura de imagen si existe */}
                    {item.imageUrl && (
                      <div className="w-full h-32 mb-4 bg-slate-100 dark:bg-slate-900 rounded-lg overflow-hidden border border-slate-100 dark:border-slate-700">
                        <img src={item.imageUrl} alt="Miniatura" className="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity" />
                      </div>
                    )}

                    <div className="flex justify-between items-start mb-4">
                      <span className="inline-block px-3 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-bold rounded-lg uppercase">{item.category}</span>
                      <span className="text-xs text-slate-400 font-medium flex items-center gap-1">
                        <i data-lucide="calendar" className="w-3 h-3"></i> {item.lastUpdated}
                      </span>
                    </div>
                    <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-3 group-hover:text-indigo-700 transition-colors">{item.title}</h3>
                    <p className="text-sm text-slate-500 mt-auto bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700/50 line-clamp-2">
                      <span className="font-semibold text-slate-700 dark:text-slate-300">Paso 1:</span> {item.steps[0]}
                    </p>
                  </div>
                ))}
              </div>
            )}
          </main>

          {/* Modal de Detalle - ADAPTADO PARA IMPRESIÓN/PDF */}
          {selectedItem && (
            <div className="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 print:static print:bg-transparent print:p-0 print:block">
              <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl transition-colors duration-200 print:shadow-none print:max-w-none print:border-none print:overflow-visible print:max-h-none print:bg-white print:text-black">
                
                <div className="p-6 border-b dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 print:bg-white print:border-slate-300 flex justify-between items-start">
                  <div>
                    <span className="inline-block px-3 py-1 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 print:bg-slate-100 print:text-slate-700 print:border print:border-slate-300 text-xs font-bold rounded-lg uppercase mb-3">
                      {selectedItem.category}
                    </span>
                    <h2 className="text-2xl font-bold text-slate-800 dark:text-white print:text-black leading-tight pr-4">{selectedItem.title}</h2>
                    <p className="text-sm text-slate-500 dark:text-slate-400 print:text-slate-600 mt-2 font-medium flex items-center gap-1">
                      <i data-lucide="clock" className="w-4 h-4"></i> Última actualización: {selectedItem.lastUpdated}
                    </p>
                  </div>
                  
                  {/* Botones de acción - Ocultos al imprimir */}
                  <div className="flex gap-1 flex-shrink-0 print:hidden">
                    <button onClick={handleShare} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-full transition" title="Compartir">
                      <i data-lucide="share-2" className="w-5 h-5"></i>
                    </button>
                    <button onClick={() => window.print()} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 rounded-full transition" title="Descargar PDF">
                      <i data-lucide="download" className="w-5 h-5"></i>
                    </button>
                    <div className="w-px h-6 bg-slate-200 dark:bg-slate-700 my-auto mx-1"></div>
                    <button onClick={() => handleDeleteItem(selectedItem.id)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-full transition" title="Borrar">
                      <i data-lucide="trash-2" className="w-5 h-5"></i>
                    </button>
                    <button onClick={() => setSelectedItem(null)} className="p-2 text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 rounded-full transition ml-1">
                      <i data-lucide="x" className="w-5 h-5"></i>
                    </button>
                  </div>
                </div>
                
                <div className="p-6 overflow-y-auto bg-white dark:bg-slate-800 print:overflow-visible print:bg-white">
                  
                  {/* Imagen adjunta en el detalle */}
                  {selectedItem.imageUrl && (
                    <div className="mb-8 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 print:border-slate-300">
                      <img src={selectedItem.imageUrl} alt="Imagen adjunta" className="w-full h-auto object-contain max-h-[400px] bg-slate-50 dark:bg-slate-900 print:bg-white" />
                    </div>
                  )}

                  <div className="space-y-6">
                    {selectedItem.steps.map((step, index) => (
                      <div key={index} className="flex gap-4 print:break-inside-avoid">
                        <div className="w-10 h-10 shrink-0 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 print:bg-white print:text-black print:border-2 print:border-slate-800 rounded-2xl flex items-center justify-center font-bold text-lg border border-indigo-100">
                          {index + 1}
                        </div>
                        <div className="pt-2 text-slate-700 dark:text-slate-200 print:text-black leading-relaxed whitespace-pre-wrap text-base">
                          {step}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                
                {/* Footer oculto al imprimir */}
                <div className="p-6 border-t dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 flex justify-end rounded-b-2xl print:hidden">
                  <button onClick={() => setSelectedItem(null)} className="px-6 py-2.5 bg-slate-800 dark:bg-indigo-600 hover:bg-slate-900 text-white font-medium rounded-xl transition">
                    Cerrar
                  </button>
                </div>
              </div>
            </div>
          )}
          
          <AddManualModal isOpen={isAddModalOpen} onClose={() => setIsAddModalOpen(false)} onSave={handleAddItem} categories={categories} />
          <SystemManualModal isOpen={isSystemManualOpen} onClose={() => setIsSystemManualOpen(false)} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
